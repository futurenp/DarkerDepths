buildscript {
    repositories {
        maven { url = "https://files.minecraftforge.net/maven" }
        maven { url = "https://repo.spongepowered.org/repository/maven-public/" }
        mavenCentral()
    }
    dependencies {
        classpath group: "net.minecraftforge.gradle", name: "ForgeGradle", version: "5.1.+", changing: true
        classpath group: "org.spongepowered", name: "mixingradle", version: "0.7-SNAPSHOT"
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'org.spongepowered.mixin'

group = 'com.natebobber'
version = "${project.minecraft}-${project.modVersion}"

mixin {
    add sourceSets.main, "darkerdepths.refmap.json"
}

java {
    archivesBaseName = project.modId
    toolchain.languageVersion = JavaLanguageVersion.of(8)
}


minecraft {
    mappings channel: project.mappingsChannel, version: project.mappings
    accessTransformer = file("src/main/resources/META-INF/accesstransformer.cfg")

    runs {
        client {
            workingDirectory project.file("run")
            property "forge.logging.markers", "SCAN,REGISTRIES,REGISTRYDUMP"
            property "forge.logging.console.level", "debug"
            property "mixin.env.remapRefMap", "true"
            property "mixin.env.refMapRemappingFile", "${projectDir}/build/createSrgToMcp/output.srg"
            arg "-mixin.config=darkerdepths.mixins.json"
            mods {
                darkerdepths {
                    source sourceSets.main
                }
            }
        }
        server {
            workingDirectory project.file("run")
            property "forge.logging.markers", "SCAN,REGISTRIES,REGISTRYDUMP"
            property "forge.logging.console.level", "debug"
            property "mixin.env.remapRefMap", "true"
            property "mixin.env.refMapRemappingFile", "${projectDir}/build/createSrgToMcp/output.srg"
            arg "-mixin.config=darkerdepths.mixins.json"
            mods {
                darkerdepths {
                    source sourceSets.main
                }
            }
        }
        data {
            workingDirectory project.file("run")
            property "forge.logging.markers", "SCAN,REGISTRIES,REGISTRYDUMP"
            property "forge.logging.console.level", "debug"
            property "mixin.env.remapRefMap", "true"
            property "mixin.env.refMapRemappingFile", "${projectDir}/build/createSrgToMcp/output.srg"
            args "--mod", project.modId, "--all", "--output", file("src/generated/resources/"), "--existing", file("src/main/resources")
            mods {
                darkerdepths {
                    source sourceSets.main
                }
            }
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }


dependencies {
    minecraft "net.minecraftforge:forge:${project.minecraft}-${project.forge}"

    implementation fg.deobf("curse.maven:cavebiome-api-441706:3434775")
    implementation fg.deobf("curse.maven:orcinus-caves-492376:3436979")
    implementation fg.deobf("curse.maven:catalogue-459701:3399554")
    implementation fg.deobf("curse.maven:configured-457570:3434071")

    annotationProcessor 'org.spongepowered:mixin:0.8.4:processor'
}

repositories {
    maven { url "https://www.cursemaven.com" }
}

jar {
    manifest {
        attributes([
                "Specification-Title"		: "Darker Depths",
                "Specification-Vendor"		: "natebobber",
                "Specification-Version"		: "1",
                "Implementation-Title"		: project.name,
                "Implementation-Version"	: project.version,
                "Implementation-Vendor" 	: "natebobber",
                "MixinConfigs"				: "darkerdepths.mixins.json",
                "Implementation-Timestamp"	: new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}