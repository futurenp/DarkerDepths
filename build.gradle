buildscript {
    repositories {
        maven { url = "https://files.minecraftforge.net/maven" }
        maven { url = "https://repo.spongepowered.org/repository/maven-public/" }
        jcenter()
        mavenCentral()
    }
    dependencies {
        classpath group: "net.minecraftforge.gradle", name: "ForgeGradle", version: "3.+", changing: true
        classpath group: "org.spongepowered", name: "mixingradle", version: "0.7-SNAPSHOT"
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'eclipse'
apply plugin: 'maven-publish'
apply plugin: 'org.spongepowered.mixin'

mixin {
    add sourceSets.main, "darkerdepths.refmap.json"
}

version = '1.0.1'
group = 'com.natebobber.darkerdepths'
archivesBaseName = 'DarkerDepths-1.16.5'

sourceCompatibility = targetCompatibility = compileJava.sourceCompatibility = compileJava.targetCompatibility = '1.8'

minecraft {
    mappings channel: 'snapshot', version: '20210309-1.16.5'
    accessTransformer = file('src/main/resources/META-INF/accesstransformer.cfg')

    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'SCAN,REGISTRIES,REGISTRYDUMP'
            property 'forge.logging.console.level', 'debug'
//            property "mixin.env.disableRefMap", "true"
            arg "-mixin.config=darkerdepths.mixins.json"
            mods {
                darkerdepths {
                    source sourceSets.main
                }
            }
        }

        server {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'SCAN,REGISTRIES,REGISTRYDUMP'
            property 'forge.logging.console.level', 'debug'
//            property "mixin.env.disableRefMap", "true"
            arg "-mixin.config=darkerdepths.mixins.json"
            mods {
                darkerdepths {
                    source sourceSets.main
                }
            }
        }

        data {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'SCAN,REGISTRIES,REGISTRYDUMP'
            property 'forge.logging.console.level', 'debug'
            args '--mod', 'darkerdepths', '--all', '--output', file('src/generated/resources/')
            mods {
                darkerdepths {
                    source sourceSets.main
                }
            }
        }
    }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.16.5-36.1.4'
    implementation fg.deobf('curse.maven:bgcore-441706:3320246')
}

repositories {
    maven {
        url = "https://www.cursemaven.com"
    }
}

jar {
    manifest {
        attributes([
                "Specification-Title"		: "Darker Depths",
                "Specification-Vendor"		: "natebobber",
                "Specification-Version"		: "1",
                "Implementation-Title"		: project.name,
                "Implementation-Version"	: "${version}",
                "Implementation-Vendor" 	: "natebobber",
                "Implementation-Timestamp"	: new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                "MixinConfigs"				: "darkerdepths.mixins.json"
        ])
    }
}